<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兔子錢大冒險：我的理財日記</title>
<style>
:root{
  --paper:#fff8f0; --paper2:#fdeede;
  --leaf:#8bc34a; --leaf-d:#689f38;
  --pink:#ff9eb5; --pink-d:#f06292;
  --peach:#ffb38a; --peach-d:#ff8a5c;
  --mint:#8fd6a6; --mint-d:#4caf7d;
  --sky:#8ec7f0; --sky-d:#4fa8e0;
  --lilac:#c7a9f0; --lilac-d:#9575cd;
  --sun:#ffd97a; --sun-d:#f5b921;
  --danger:#ff6b57; --danger-d:#e2503b;
  --brown:#8d6e63; --brown-d:#6d4c41;
  --ink:#5b4636; --ink-soft:#8a7563;
  --c-money:#f5b921; --c-happy:#ff8fb0; --c-growth:#6fcf97; --c-health:#ff8a5c;
  --shadow:0 6px 16px rgba(120,90,60,.18);
  --shadow-s:0 3px 8px rgba(120,90,60,.16);
  --radius:20px;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
  font-family:"Baloo 2","Comic Sans MS","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  color:var(--ink); overflow:hidden;
  background:
    radial-gradient(circle at 12% 15%, #ffe9d6 0, transparent 40%),
    radial-gradient(circle at 88% 85%, #ffe0ea 0, transparent 42%),
    linear-gradient(160deg,#fff6ec,#fdeef4);
}
button{font-family:inherit;cursor:pointer;border:none;}
.hidden{display:none !important;}
::-webkit-scrollbar{height:10px;width:10px;}
::-webkit-scrollbar-thumb{background:#e6cdb5;border-radius:10px;}
.hand{ border:3px solid #fff; box-shadow:var(--shadow); border-radius:var(--radius); background:var(--paper);}

/* ===== 設定畫面 ===== */
#setup{ height:100%; overflow-y:auto; padding:26px 18px 60px;}
.setup-wrap{ max-width:980px; margin:0 auto;}
.title-card{ text-align:center; padding:22px; margin-bottom:20px;}
.title-card h1{ margin:0; font-size:40px; color:var(--peach-d); letter-spacing:1px; transform:rotate(-1deg);}
.title-card p{ margin:8px 0 0; color:var(--ink-soft); font-size:16px;}
.sec{ padding:20px 24px; margin-bottom:18px;}
.sec > h2{ margin:0 0 14px; font-size:22px; color:var(--peach-d); display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.row{ display:flex; flex-wrap:wrap; gap:10px; align-items:center;}
.pill{ border:2px solid var(--peach); background:#fff; color:var(--ink); padding:8px 18px; border-radius:999px; font-size:16px; font-weight:700;}
.pill.active{ background:var(--peach); color:#fff;}
input[type=number],input[type=text]{ font-family:inherit; font-size:15px; padding:8px 12px; border:2px solid var(--paper2); border-radius:12px; background:#fff; color:var(--ink);}
input:focus{ outline:none; border-color:var(--sky-d);}

#teamList{ display:flex; flex-direction:column; gap:10px;}
.team-row{ display:flex; align-items:center; gap:10px; background:#fff; border:2px solid var(--paper2); border-radius:14px; padding:8px 12px;}
.team-row .name-in{ flex:1; min-width:140px;}
.add-btn{ margin-top:10px; border:2px dashed var(--mint-d); background:#f2fbef; color:var(--mint-d); padding:10px; border-radius:14px; font-size:16px; font-weight:800; width:100%;}

.disc{ width:32px;height:32px;border-radius:50%;color:#fff;font-weight:900;display:flex;align-items:center;justify-content:center;font-size:15px;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3);flex:none;}
.disc-inline{ display:inline-flex;width:24px;height:24px;border-radius:50%;color:#fff;font-weight:900;align-items:center;justify-content:center;font-size:13px;vertical-align:middle;border:2px solid #fff;}
.icon-btn{ background:var(--danger); color:#fff; width:32px; height:32px; border-radius:50%; font-size:16px; flex:none;}

.weights{ display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px;}
.w-item{ background:#fff; border:2px solid var(--paper2); border-radius:14px; padding:10px 12px;}
.w-item .w-top{ display:flex; justify-content:space-between; font-weight:800;}
.w-item input[type=range]{ width:100%; margin-top:6px; accent-color:var(--peach-d);}

/* 格子內容編輯器 */
.tile-group{ border:2px solid var(--paper2); border-radius:14px; padding:12px 14px; margin-bottom:12px; background:#fff;}
.tg-head{ font-weight:900; font-size:17px; margin-bottom:8px; color:var(--peach-d);}
.tg-sub{ font-weight:800; color:var(--ink-soft); margin:10px 0 4px; font-size:14px;}
.tg-textrow{ display:flex; align-items:center; gap:8px; margin-bottom:8px;}
.tg-textrow > span{ font-size:14px; color:var(--ink-soft); white-space:nowrap;}
.tg-text{ flex:1; min-width:120px;}
.tg-list{ display:flex; flex-direction:column; gap:8px;}
.opt-row{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:var(--paper); border-radius:10px; padding:6px 8px;}
.opt-label{ flex:1; min-width:150px;}
.opt-label-static{ flex:1; min-width:120px; font-weight:700;}
.opt-num{ display:inline-flex; align-items:center; gap:2px; font-size:13px;}
.opt-num input{ width:58px; padding:5px 6px;}
.opt-frag{ display:inline-flex; align-items:center; gap:3px; font-size:13px; white-space:nowrap;}
.opt-del{ background:var(--danger); color:#fff; width:28px; height:28px; border-radius:8px; font-size:14px; flex:none;}
.opt-add{ margin-top:8px; border:2px dashed var(--peach-d); background:#fff6ef; color:var(--peach-d); border-radius:10px; padding:8px 14px; font-weight:800;}

.fs-btn{ border:2px solid var(--paper2); background:#fff; color:var(--ink); border-radius:12px; padding:9px 16px; font-weight:800; font-size:15px; box-shadow:var(--shadow-s);}
.mini-btn{ border:2px solid var(--danger); background:#fff; color:var(--danger-d); border-radius:12px; padding:9px 16px; font-weight:800; font-size:15px;}
.save-note{ font-size:13px; color:var(--mint-d); font-weight:700;}
.big-start{ width:100%; padding:18px; font-size:26px; font-weight:900; color:#fff; border-radius:20px; background:linear-gradient(180deg,var(--mint),var(--mint-d)); box-shadow:var(--shadow); margin-top:6px;}
.big-start:hover{ filter:brightness(1.05);}

/* ===== 遊戲畫面 ===== */
#game{ height:100%; display:flex; flex-direction:column;}
#gtop{ display:flex; align-items:center; gap:14px; padding:8px 16px;}
#gtop .g-title{ font-size:20px; font-weight:900; color:var(--peach-d); white-space:nowrap;}
.round-chip{ background:#fff; border:3px solid var(--sky-d); color:var(--sky-d); font-weight:800; font-size:18px; padding:6px 16px; border-radius:14px; box-shadow:var(--shadow-s); white-space:nowrap;}
.turn-banner{ flex:1; text-align:center; font-size:24px; font-weight:900; color:#fff; padding:8px 14px; border-radius:16px; box-shadow:var(--shadow-s); transition:background .3s;}

#gmid{ flex:1; display:flex; min-height:0; padding:0 12px 6px; gap:12px;}
#mapArea{ flex:1; display:flex; align-items:center; justify-content:center; position:relative; min-width:0;}
#board{ display:grid; gap:5px;}
.tile{ border-radius:12px; position:relative; padding:3px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; border:2px solid rgba(255,255,255,.75); box-shadow:0 2px 5px rgba(120,90,60,.15);}
.tile .t-no{ position:absolute; top:1px; left:4px; font-size:calc(var(--tile,64px)*0.13); opacity:.45;}
.tile .t-emoji{ font-size:calc(var(--tile,64px)*0.42); line-height:1.02;}
.tile .t-label{ font-size:calc(var(--tile,64px)*0.19); font-weight:800; margin-top:1px; text-align:center; line-height:1.05;}
.tile .t-tokens{ position:absolute; inset:0; display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:2px; pointer-events:none;}
.tk{ width:calc(var(--tile,64px)*0.42); height:calc(var(--tile,64px)*0.42); border-radius:50%; border:3px solid #fff; display:flex; align-items:center; justify-content:center; font-size:calc(var(--tile,64px)*0.26); font-weight:900; color:#fff; box-shadow:0 2px 5px rgba(0,0,0,.4); transition:transform .15s;}
.tk.moving{ transform:scale(1.55); z-index:6; box-shadow:0 0 0 4px var(--sun),0 4px 10px rgba(0,0,0,.5);}
.t-start{background:#fff3c4;} .t-shop{background:#ffd3b6;} .t-challenge{background:#ffb3ba;}
.t-bank{background:#bae1ff;} .t-charity{background:#ffc4e1;} .t-park{background:#c4f5cf;} .t-chance{background:#e0c3fc;}
.board-center{ background:linear-gradient(135deg,#fffdf6,#fdf1e4); border:3px dashed #f0d3b8; border-radius:22px; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:inset 0 0 22px rgba(245,185,33,.12);}
.board-center .bc-dice{ font-size:calc(var(--tile,64px)*0.9);} .bc-dice.rolling{ animation:shake .25s infinite;}
@keyframes shake{25%{transform:rotate(-16deg) scale(1.1);}75%{transform:rotate(16deg) scale(1.1);}}
.board-center .bc-title{ font-size:22px; font-weight:900; color:var(--peach-d);}
.board-center .bc-sub{ font-size:15px; color:var(--ink-soft); margin-top:2px; text-align:center; padding:0 10px;}

/* 控制面板 */
#control{ width:216px; flex:none; display:flex; flex-direction:column; gap:10px; padding:12px; overflow-y:auto;}
#control h3{ margin:0 0 4px; font-size:13px; color:var(--ink-soft);}
.cbtn{ width:100%; padding:13px 8px; font-size:17px; font-weight:900; color:#fff; border-radius:14px; box-shadow:var(--shadow-s); line-height:1.15;}
.cbtn:active{ transform:translateY(1px);}
.cbtn:disabled{ opacity:.4; box-shadow:none;}
.cbtn.end{ background:var(--peach-d);}
.cbtn.finish{ background:var(--danger-d);}
.cbtn.undo{ background:#b0a190; font-size:15px; padding:11px 8px;}
.ctrl-dice{ text-align:center; background:#fff; border-radius:14px; padding:8px; box-shadow:var(--shadow-s);}
.ctrl-dice .cd-face{ font-size:46px;}
.ctrl-dice .cd-txt{ font-size:13px; color:var(--ink-soft);}
.dice-pad{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px;}
.dice-btn{ padding:14px 0; font-size:24px; font-weight:900; color:#fff; background:var(--sky-d); border-radius:12px; box-shadow:var(--shadow-s);}
.dice-btn:active{ transform:translateY(1px);}
.dice-btn:disabled{ opacity:.4; box-shadow:none;}
.dice-manual{ display:flex; gap:6px; margin-top:6px;}
.dice-manual input{ flex:1; width:100%; text-align:center; font-size:18px;}
.dice-manual button{ background:var(--brown-d); color:#fff; border-radius:12px; padding:0 14px; font-weight:800;}

/* 儀表板 */
#dash{ display:flex; gap:10px; padding:6px 12px 10px; overflow-x:auto;}
.pcard{ flex:1; min-width:196px; background:#fff; border:3px solid var(--paper2); border-radius:18px; padding:10px 12px; position:relative;}
.pcard.active{ border-color:var(--sun-d); box-shadow:0 0 0 3px rgba(245,185,33,.35), var(--shadow-s); transform:translateY(-4px);}
.pcard.paused{ opacity:.6;}
.pcard.bump{ animation:bump .4s;}
@keyframes bump{ 30%{transform:scale(1.05);} }
.pc-head{ display:flex; align-items:center; gap:8px;}
.pc-name{ font-weight:900; font-size:16px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.pc-money{ background:#fff6d9; color:var(--sun-d); font-weight:900; font-size:15px; padding:2px 8px; border-radius:10px; white-space:nowrap;}
.pc-money.neg{ background:#ffe0da; color:var(--danger-d);}
.pc-bars{ margin-top:8px; display:flex; flex-direction:column; gap:5px;}
.bar{ display:flex; align-items:center; gap:6px; font-size:12px;}
.bar .b-ico{ width:18px; text-align:center;}
.bar .b-cells{ flex:1; display:flex; gap:2px;}
.seg{ flex:1; height:15px; border-radius:4px; background:#efe6db; box-shadow:inset 0 0 0 1px rgba(120,90,60,.06); transition:background .2s;}
.seg.on.happy{background:var(--c-happy);} .seg.on.growth{background:var(--c-growth);} .seg.on.health{background:var(--c-health);}
.bar .b-val{ width:30px; text-align:right; font-weight:800;}
.pc-frags{ margin-top:8px; display:flex; gap:6px; align-items:center; font-size:12px;}
.frag{ width:24px; height:24px; border-radius:50%; border:2px dashed #d9c8b6; display:flex; align-items:center; justify-content:center; font-size:13px; color:#cbb9a6;}
.frag.got{ border:2px solid var(--mint-d); background:#e8f8ee; color:var(--mint-d);}
.pc-badges{ position:absolute; top:8px; right:10px; display:flex; gap:4px;}
.badge{ font-size:11px; font-weight:800; padding:2px 7px; border-radius:999px;}
.badge.vip{ background:#fff3c4; color:var(--sun-d);}
.badge.ins{ background:#e3f2fd; color:#1976d2;}
.badge.pause{ background:#ffe0da; color:var(--danger-d);}

/* 彈窗 */
#modalLayer{ position:absolute; inset:0; z-index:60; background:rgba(91,70,54,.42); display:flex; align-items:center; justify-content:center; padding:18px;}
.modal{ background:var(--paper); border:4px solid #fff; border-radius:26px; box-shadow:var(--shadow); max-width:600px; width:100%; padding:22px 26px; text-align:center; animation:pop .3s cubic-bezier(.2,1.4,.5,1); max-height:92vh; overflow-y:auto;}
@keyframes pop{ from{transform:scale(.7); opacity:0;} }
.modal .m-emoji{ font-size:60px;}
.modal .m-title{ font-size:27px; font-weight:900; margin:4px 0;}
.modal .m-who{ font-size:15px; color:var(--ink-soft);}
.modal .m-text{ font-size:19px; color:var(--ink); line-height:1.45; margin:10px 4px;}
.m-opts{ display:flex; flex-direction:column; gap:10px; margin-top:14px;}
.opt{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 18px; border-radius:16px; font-size:17px; font-weight:800; color:#fff; box-shadow:var(--shadow-s); text-align:left;}
.opt:disabled{ opacity:.45; box-shadow:none;}
.opt .o-eff{ font-size:14px; font-weight:800; background:rgba(255,255,255,.28); padding:3px 10px; border-radius:999px; white-space:nowrap;}
.opt.buy{background:var(--peach-d);} .opt.good{background:var(--mint-d);} .opt.info{background:var(--sky-d);}
.opt.warn{background:var(--danger-d);} .opt.plain{background:#b0a190;} .opt.special{background:var(--lilac-d);} .opt.evil{background:#7e57c2;}
/* 挑戰倒數 */
.ch-timer{ margin:14px auto 4px; display:flex; flex-direction:column; align-items:center; gap:10px;}
.ch-timer .ring{ width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:900;color:#fff;background:conic-gradient(var(--sky-d) var(--deg,360deg), #e6ddd3 0);}
.ch-timer .ring span{ background:var(--paper); width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--sky-d);}
.ch-btns{ display:flex; gap:10px;}
.ch-btns button{ padding:10px 22px; border-radius:12px; font-weight:800; font-size:16px; color:#fff;}
#chToggle{ background:var(--mint-d);}
#chReset{ background:#b0a190;}
.draw-spin{ font-size:90px; display:inline-block; animation:spin .6s linear infinite;}
@keyframes spin{ to{ transform:rotate(360deg);} }

/* 結算 */
#results{ position:absolute; inset:0; z-index:70; background:linear-gradient(160deg,#fff2d6,#ffe1ec); display:flex; align-items:center; justify-content:center; padding:20px; overflow:auto;}
.res-card{ background:var(--paper); border:4px solid #fff; border-radius:28px; box-shadow:var(--shadow); padding:26px 30px; max-width:760px; width:100%;}
.res-card h2{ text-align:center; font-size:34px; margin:0 0 6px; color:var(--peach-d);}
.res-card .champ{ text-align:center; margin:8px 0 18px;}
.res-card .champ .c-disc{ width:90px;height:90px;border-radius:50%;color:#fff;font-weight:900;font-size:44px;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;border:3px solid #fff;box-shadow:var(--shadow);}
.res-card .champ .c-name{ font-size:32px; font-weight:900;}
.res-row{ display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:14px; font-size:18px;}
.res-row:nth-child(even){ background:#fff;}
.res-row .r-rank{ font-size:24px; width:44px; text-align:center;}
.res-row .r-name{ flex:1; font-weight:800;}
.res-row .r-break{ font-size:13px; color:var(--ink-soft); min-width:220px; text-align:right;}
.res-row .r-total{ font-size:24px; font-weight:900; color:var(--mint-d); min-width:90px; text-align:right;}
.res-again{ display:block; margin:20px auto 0; padding:14px 40px; font-size:20px; font-weight:900; color:#fff; border-radius:16px; background:var(--mint-d); box-shadow:var(--shadow);}

#confetti{ position:fixed; inset:0; z-index:120; pointer-events:none;}
.toast{ position:absolute; bottom:14px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 22px; border-radius:999px; font-weight:800; z-index:80; box-shadow:var(--shadow); opacity:0; transition:opacity .3s; max-width:80%; text-align:center;}
.toast.show{ opacity:1;}
.toast.warn{ background:var(--danger-d);}
</style>
</head>
<body>

<!-- ===== 設定 ===== -->
<div id="setup">
  <div class="setup-wrap">
    <div class="title-card hand">
      <h1>🐰 兔子錢大冒險 💰</h1>
      <p>我的理財日記 · 課堂單機主控版 · 老師操作投影大螢幕</p>
    </div>

    <div class="sec hand">
      <h2>⏳ 遊戲長度（最大回合數）</h2>
      <div class="row" id="roundPills"></div>
      <div class="row" id="customRoundRow" style="margin-top:10px;display:none;">
        <span>自訂回合：</span><input type="number" id="customRound" min="1" max="30" value="6" style="width:90px;">
      </div>
    </div>

    <div class="sec hand">
      <h2>🚩 隊伍設定 <span style="font-size:14px;color:var(--ink-soft);font-weight:400;">（2～8 組，實體用磁性小白板代表，可改名）</span></h2>
      <div id="teamList"></div>
      <button class="add-btn" id="addTeam">＋ 新增一組</button>
    </div>

    <div class="sec hand">
      <h2>🗺️ 地圖格子比例</h2>
      <div class="row" style="margin-bottom:12px;">
        <span>地圖總格數：</span><input type="number" id="totalTiles" min="12" max="36" step="4" value="24" style="width:90px;">
        <span style="font-size:13px;color:var(--ink-soft);">（4 的倍數，長方形環狀地圖剛好排滿，且相鄰格子不重複）</span>
      </div>
      <div class="weights" id="weights"></div>
    </div>

    <div class="sec hand">
      <h2>🎪 格子內容設定 <span style="font-size:14px;color:var(--ink-soft);font-weight:400;">（商店 / 挑戰 / 命運 / 愛心 / 公園 可自由編輯）</span></h2>
      <div id="tileEditor"></div>
    </div>

    <div class="row" style="gap:12px; margin-bottom:12px; align-items:center;">
      <button class="fs-btn" id="fsBtnSetup">⛶ 全螢幕</button>
      <button class="mini-btn" id="resetSetup">↺ 回復預設設定</button>
      <span class="save-note">✅ 設定自動存本機＋雲端 · <span id="cloudStatus">…</span></span>
    </div>

    <button class="big-start" id="startGame">▶ 開始冒險</button>
  </div>
</div>

<!-- ===== 遊戲 ===== -->
<div id="game" class="hidden">
  <div id="gtop">
    <div class="g-title">🐰 兔子錢大冒險</div>
    <div class="round-chip" id="roundChip">第 1 / 6 回合</div>
    <div class="turn-banner" id="turnBanner">準備開始</div>
  </div>

  <div id="gmid">
    <div id="mapArea">
      <div id="board"></div>
      <div id="modalLayer" class="hidden"></div>
      <div id="results" class="hidden"></div>
      <div class="toast" id="toast"></div>
    </div>
    <div id="control" class="hand">
      <div class="ctrl-dice">
        <div class="cd-face" id="ctrlDice">🎲</div>
        <div class="cd-txt" id="ctrlDiceTxt">請輸入骰子點數</div>
      </div>
      <div>
        <h3>🎲 實體骰子點數（講者輸入）</h3>
        <div class="dice-pad" id="dicePad"></div>
        <div class="dice-manual">
          <input type="number" id="diceInput" min="1" max="99" placeholder="其他點數">
          <button id="diceGo">前進</button>
        </div>
      </div>
      <div>
        <h3>回合控制</h3>
        <button class="cbtn end" id="btnEnd">➡ 結束回合</button>
      </div>
      <button class="cbtn undo" id="btnUndo">↩ 復原上一步</button>
      <button class="cbtn finish" id="btnFinish">⏹ 結束並結算</button>
      <button class="cbtn" id="btnMute" style="background:#9c8a76;font-size:15px;padding:11px 8px;">🔊 音效：開</button>
      <button class="cbtn fs-btn" style="background:#7fa9c9;font-size:15px;padding:11px 8px;">⛶ 全螢幕</button>
    </div>
  </div>

  <div id="dash"></div>

  function ensure(){ if(!ctx){ try{ ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } } if(ctx.state==='suspended') ctx.resume(); return ctx; }
  function note(f,s,d,type='sine',vol=0.2){ const c=ensure(); if(!c||!enabled) return; const o=c.createOscillator(),g=c.createGain(); o.type=type;o.frequency.value=f; const t=c.currentTime+s; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+d); o.connect(g).connect(c.destination); o.start(t); o.stop(t+d+0.03); }
  const seq=(a,type,vol)=>a.forEach(([f,s,d])=>note(f,s,d,type,vol));

    ensure, setEnabled(v){enabled=v;}, isEnabled(){return enabled;},

/* ---- 地圖：長方形環狀、相鄰不重複 ---- */
function buildMap(total, weights){
  const slots=total-1;
  const keys=Object.keys(weights).filter(k=>weights[k]>0);
  const sum=keys.reduce((a,k)=>a+weights[k],0)||1;
  let pool=[];
  keys.forEach(k=>{ const n=Math.round(slots*weights[k]/sum); for(let i=0;i<n;i++) pool.push(k); });
  while(pool.length<slots) pool.push(keys[Math.floor(Math.random()*keys.length)]||'park');
  pool=pool.slice(0,slots);
  const arranged=arrangeNoAdjacent(pool);
  const map=[{type:'start'}]; arranged.forEach(t=>map.push({type:t}));
  return map;
}
function arrangeNoAdjacent(arr){
  const remaining={}; arr.forEach(t=>remaining[t]=(remaining[t]||0)+1);
  const res=[]; let prev=null;
  for(let i=0;i<arr.length;i++){
    let best=null,bestC=-1;
    for(const k in remaining){ if(remaining[k]>0 && k!==prev && remaining[k]>bestC){ best=k; bestC=remaining[k]; } }
    if(best===null){ for(const k in remaining){ if(remaining[k]>0){ best=k; break; } } }
    res.push(best); remaining[best]--; prev=best;
  }
  return res;
}
function rectLayout(total){
  const s=total/2+2;            // C+R
  let C=Math.round(s*1.7/2.7), R=s-C;
  if(R<3){ R=3; C=s-R; } if(C<3){ C=3; R=s-C; }
  if(C<R){ const t=C; C=R; R=t; }
  const ring=[];
  for(let c=0;c<C;c++) ring.push([0,c]);
  for(let r=1;r<R;r++) ring.push([r,C-1]);
  for(let c=C-2;c>=0;c--) ring.push([R-1,c]);
  for(let r=R-2;r>=1;r--) ring.push([r,0]);
  return {ring,C,R};
}
let tileEls=[];
function buildBoard(){
  const board=$('board'); board.innerHTML=''; tileEls=[];
  const map=G.config.map; const {ring,C,R}=rectLayout(map.length);
  const area=$('mapArea');
  const mapW=(area.clientWidth||window.innerWidth-240)-12;
  const mapH=(area.clientHeight||window.innerHeight*0.6)-12;
  const px=Math.max(40, Math.min(Math.floor((mapW-C*5)/C), Math.floor((mapH-R*5)/R)));
  board.style.setProperty('--tile',px+'px');
  board.style.gridTemplateColumns=`repeat(${C},${px}px)`;
  board.style.gridTemplateRows=`repeat(${R},${px}px)`;
  const center=el('div','board-center'); center.style.gridColumn=`2 / ${C}`; center.style.gridRow=`2 / ${R}`;
  center.innerHTML=`<div class="bc-dice" id="bcDice">🎲</div><div class="bc-title">兔子錢大冒險</div><div class="bc-sub" id="bcSub">請講者輸入骰子點數</div>`;
  board.appendChild(center);
  map.forEach((t,i)=>{ const [r,c]=ring[i]; const e=el('div','tile t-'+t.type); e.style.gridRow=r+1; e.style.gridColumn=c+1;
    e.innerHTML=`<span class="t-no">${i}</span><span class="t-emoji">${TILE[t.type].emoji}</span><span class="t-label">${TILE[t.type].label}</span><div class="t-tokens"></div>`; board.appendChild(e); tileEls[i]=e; });
  renderTokens();
}
function renderTokens(){
  tileEls.forEach(e=>e.querySelector('.t-tokens').innerHTML='');

  const dash=$('dash'); dash.innerHTML='';
  G.players.forEach(p=>{
    const card=el('div','pcard'+(p.id===G.save.current_turn?' active':'')+(p.paused_turns>0?' paused':'')); card.dataset.pid=p.id;
    const badges=[]; if(p.is_vip) badges.push('<span class="badge vip">🏦VIP</span>'); if(p.insurance>0) badges.push(`<span class="badge ins">🛡️${p.insurance}</span>`); if(p.paused_turns>0) badges.push(`<span class="badge pause">⏸${p.paused_turns}</span>`);
    const frags=p.fragments.map(f=>`<div class="frag${f.got?' got':''}" title="${escapeHtml(f.name)}">${f.got?'🧩':'○'}</div>`).join('');
    card.innerHTML=`<div class="pc-badges">${badges.join('')}</div>
      <div class="pc-head"><span class="disc" style="background:${p.color}">${p.id+1}</span><span class="pc-name" style="color:${p.color}">${escapeHtml(p.name)}</span><span class="pc-money${p.money<0?' neg':''}">💰${p.money}</span></div>
      <div class="pc-bars">${bar('💖','happy',p.happy)}${bar('🌱','growth',p.growth)}${bar('💪','health',p.health)}</div>
      <div class="pc-frags">🧩 ${frags}</div>`;
    dash.appendChild(card);
  });
}
function bump(pid){ const e=document.querySelector(`.pcard[data-pid="${pid}"]`); if(e){ e.classList.remove('bump'); void e.offsetWidth; e.classList.add('bump'); } }
function renderButtons(){
  const busy=G.busy, canRoll=!busy && !G.turn.rolled;
  document.querySelectorAll('.dice-btn').forEach(b=> b.disabled=!canRoll);
  const di=$('diceInput'), dg=$('diceGo'); if(di) di.disabled=!canRoll; if(dg) dg.disabled=!canRoll;
  $('btnEnd').disabled = busy || !G.turn.rolled || !G.turn.resolved;
  $('btnUndo').disabled = history.length===0 || busy;
}

/* ---- 復原 ---- */
function snapshot(){ history.push(JSON.stringify({save:G.save,players:G.players,turn:G.turn})); if(history.length>50) history.shift(); }
$('btnUndo').onclick=()=>{ if(!history.length||G.busy) return; sfx.click(); const s=JSON.parse(history.pop()); G.save=s.save; G.players=s.players; G.turn=s.turn; closeModal(); renderTokens(); refreshAll(); toast('已復原上一步'); };

/* ---- 實體骰子：講者輸入點數 ---- */
function setupDicePad(){ const pad=$('dicePad'); pad.innerHTML=''; for(let n=1;n<=6;n++){ const b=el('button','dice-btn',n); b.onclick=()=>move(n); pad.appendChild(b); } }
$('diceGo').onclick=()=>{ const v=parseInt($('diceInput').value); if(v>=1){ $('diceInput').value=''; move(v); } };

async function move(n){
  if(!G||G.busy||G.turn.rolled||!n||n<1) return;
  snapshot(); G.busy=true; renderButtons();
  const p=cur();
  const face=(n>=1&&n<=6)?DICE[n-1]:('+'+n);
  $('ctrlDice').textContent=face; $('bcDice').textContent=face;
  $('ctrlDiceTxt').textContent=p.name+' 前進 '+n; $('bcSub').textContent=p.name+' 前進 '+n+' 步';
  let passedStart=false;
  for(let s=1;s<=n;s++){
    p.position=(p.position+1)%G.config.map.length;
    const tt=G.config.map[p.position].type;
    if(tt==='start') passedStart=true;
    if(s<n && p.is_vip && tt==='bank'){ p.money+=VIP_INTEREST; renderDash(); bump(p.id); sfx.gain(); toast('🏦 '+p.name+' VIP 利息 +'+VIP_INTEREST); }
    renderTokens(); sfx.step();
    const tk=tileEls[p.position].querySelector(`.tk[data-pid="${p.id}"]`); if(tk) tk.classList.add('moving');
    await sleep(300); if(tk) tk.classList.remove('moving');
  }
  G.turn.rolled=true; G.turn.resolved=false; G.busy=false; renderButtons();
  if(passedStart && G.config.map[p.position].type!=='start'){ sfx.pass(); toast('🏁 '+p.name+' 經過起點！請發實體 200 元（系統不記錄）'); }
  openTileModal(p, G.config.map[p.position]);
}

/* ---- 效果套用 ---- */
function applyEffect(p, eff){
  if(eff.money) p.money+=eff.money;
  if(eff.happy) p.happy=clamp(p.happy+eff.happy);
  if(eff.growth) p.growth=clamp(p.growth+eff.growth);
  if(eff.health) p.health=clamp(p.health+eff.health);
  if(eff.fragment){ const f=p.fragments.find(x=>!x.got); if(f) f.got=true; }
  if(eff.vip) p.is_vip=true;
  if(eff.insurance) p.insurance=(p.insurance||0)+eff.insurance;
  if(eff.pause) p.paused_turns+=eff.pause;
  renderDash(); bump(p.id);
}
function effOf(it){ return {money:it.money||0, happy:it.happy||0, growth:it.growth||0, health:it.health||0, fragment:!!it.fragment, vip:!!it.vip, insurance:it.insurance||0, pause:it.pause||0}; }
function effText(it){ const a=[];
  if(it.money) a.push((it.money>0?'+':'')+it.money+'元');
  if(it.happy) a.push('💖'+(it.happy>0?'+':'')+it.happy);
  if(it.growth) a.push('🌱'+(it.growth>0?'+':'')+it.growth);
  if(it.health) a.push('💪'+(it.health>0?'+':'')+it.health);
  if(it.fragment) a.push('🧩碎片');
  if(it.vip) a.push('🏦VIP');
  if(it.insurance) a.push('🛡️保險卡');
  if(it.pause) a.push('⏸暫停'+it.pause);
  return a.join(' ');
}
function optCls(it){ if(it.fragment||it.vip||it.insurance) return 'special'; if(it.money<0) return 'buy'; if(it.money>0||it.happy>0||it.growth>0||it.health>0) return 'good'; return 'plain'; }
function optRow(cls,label,eff,handler,disabled){ const b=el('button','opt '+cls); b.disabled=!!disabled; b.innerHTML=`<span>${label}</span>${eff?`<span class="o-eff">${eff}</span>`:''}`; if(!disabled) b.onclick=handler; return b; }
function teamTag(p){ return `<span class="disc-inline" style="background:${p.color}">${p.id+1}</span> ${escapeHtml(p.name)}`; }

function resolveEvent(p, eff, msg){
  snapshot(); applyEffect(p, eff); G.turn.resolved=true; stopCh(); closeModal(); renderButtons();
  if(eff.fragment) sfx.fragment(); else if(eff.vip||eff.insurance) sfx.vip();
  else if(eff.happy>0||eff.growth>0||eff.health>0||eff.money>0) sfx.gain();
  else if(eff.money<0) sfx.buy(); else sfx.click();
  if(msg) toast(msg);
}

/* ---- 回合 / 換隊 / 送醫 ---- */
$('btnEnd').onclick=()=>{
  if(G.busy||!G.turn.rolled||!G.turn.resolved) return; sfx.click(); snapshot();
  const p=cur(); p.health=clamp(p.health-1); renderDash(); bump(p.id);
  const zero=[]; if(p.health<=0) zero.push('health'); if(p.happy<=0) zero.push('happy');
  if(zero.length){ p.money-=MEDICAL_FEE; p.paused_turns+=1; zero.forEach(s=>{ if(!p.reviveStats.includes(s)) p.reviveStats.push(s); }); renderDash(); bump(p.id); showCrisisModal(p,zero); return; }
  advanceTurn();
};
function showCrisisModal(p, zero){
  const hasH=zero.includes('health'), hasHappy=zero.includes('happy');
  const emoji=hasH?'🚑':'😢'; const title=(hasH&&hasHappy)?'緊急照護！':hasH?'強制送醫！':'心情崩潰，強制休息！';
  const reason=(hasH&&hasHappy)?'健康值與幸福值都歸零了':hasH?'健康值歸零':'幸福值歸零';
  const rev=zero.map(s=>s==='health'?'健康值':'幸福值').join('、');
  if(hasH) sfx.medical(); else sfx.sad();
  const layer=$('modalLayer');
  layer.innerHTML=`<div class="modal"><div class="m-emoji">${emoji}</div><div class="m-title" style="color:var(--danger-d)">${title}</div><div class="m-who">${teamTag(p)}</div><div class="m-text">${reason}，需要好好休養！<br>扣除照護費 <b>${MEDICAL_FEE} 元</b>，並<b>暫停一回合</b>。<br>暫停結束後 ${rev} 會恢復為 ${REVIVE_HEALTH}。</div><div class="m-opts"><button class="opt warn" data-x>😢 知道了，換下一組</button></div></div>`;
  layer.classList.remove('hidden');
  layer.querySelector('[data-x]').onclick=()=>{ sfx.click(); closeModal(); advanceTurn(); };
}
function advanceTurn(){
  closeModal(); let guard=0;
  while(guard++<G.players.length*3){
    G.save.current_turn=(G.save.current_turn+1)%G.players.length;
    if(G.save.current_turn===0){ G.save.current_round++; if(G.save.current_round>G.save.max_rounds){ endGame(); return; } }
    const np=G.players[G.save.current_turn];
    if(np.paused_turns>0){ np.paused_turns--; if(np.paused_turns===0){ const rev=(np.reviveStats&&np.reviveStats.length)?np.reviveStats:['health']; rev.forEach(s=>np[s]=REVIVE_HEALTH); const rt=rev.map(s=>s==='health'?'健康':'幸福').join('、'); np.reviveStats=[]; toast('⏰ '+np.name+' 暫停結束，'+rt+'恢復為 '+REVIVE_HEALTH); } else toast('⏸ '+np.name+' 暫停中，跳過本回合'); renderDash(); continue; }
    break;
  }
  G.turn={rolled:false, resolved:true};
  $('bcDice').textContent='🎲'; $('bcSub').textContent='請講者輸入骰子點數'; $('ctrlDice').textContent='🎲'; $('ctrlDiceTxt').textContent='請輸入骰子點數';
  renderTokens(); refreshAll(); sfx.turn(); toast('輪到 '+cur().name+'，請輸入骰子點數');
}

/* ---- 格子事件彈窗 ---- */
function openTileModal(p, tile){
  switch(tile.type){
    case 'shop': openShop(p); break; case 'challenge': openChallenge(p); break;
    case 'bank': openBank(p); break; case 'charity': openCharity(p); break;
    case 'park': openPark(p); break; case 'chance': openChance(p); break;
    case 'start': openStart(p); break;
  }
}
function modalShell(p, emoji, title, textHtml){
  const layer=$('modalLayer');
  layer.innerHTML=`<div class="modal"><div class="m-emoji">${emoji}</div><div class="m-title" style="color:${p.color}">${title}</div><div class="m-who">${teamTag(p)}　💰${p.money} 元</div><div class="m-text">${textHtml}</div><div class="m-opts" id="mOpts"></div></div>`;
  layer.classList.remove('hidden'); return $('mOpts');
}
function openShop(p){
  const cfg=G.config.tiles.shop; const opts=modalShell(p,'🏪','商店格', escapeHtml(cfg.text));
  const pool=cfg.items.slice(); for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  const pick=pool.slice(0,Math.min(3,pool.length)); const allFrag=p.fragments.every(f=>f.got); const nf=p.fragments.find(f=>!f.got);
  pick.forEach(it=>{ let label=it.label; if(it.fragment) label=allFrag?it.label+'（已集滿）':it.label+(nf?'：'+nf.name:''); const dis=(it.money<0&&p.money< -it.money)||(it.fragment&&allFrag); opts.append(optRow(optCls(it),label,effText(it),()=>resolveEvent(p,effOf(it),'完成購買'),dis)); });
  opts.append(optRow('plain','🚪 這次先不買','',()=>resolveEvent(p,{},'離開商店')));
}
function openCharity(p){
  const cfg=G.config.tiles.charity; const opts=modalShell(p,'❤️','愛心格', escapeHtml(cfg.text));
  cfg.items.forEach(it=>{ const dis=(it.money<0&&p.money< -it.money); opts.append(optRow(optCls(it),it.label,effText(it),()=>resolveEvent(p,effOf(it),'愛心結算'),dis)); });
}
function openBank(p){
  const opts=modalShell(p,'🏦','銀行格', p.is_vip?'你已是銀行 VIP！經過起點/銀行會自動 +'+VIP_INTEREST+' 元利息。也可以再買「幸運保險卡」防止被陷害。':'來到銀行！可存錢成為 VIP，或購買「幸運保險卡」抵擋一次被別組陷害。');
  if(!p.is_vip) opts.append(optRow('special','🏦 存 '+VIP_COST+' 元成為 VIP','−'+VIP_COST+'元 🏦VIP',()=>resolveEvent(p,{money:-VIP_COST,vip:true},'成為銀行 VIP！'), p.money<VIP_COST));
  opts.append(optRow('special','🛡️ 買幸運保險卡','−'+INSURANCE_COST+'元 🛡️保險卡',()=>resolveEvent(p,{money:-INSURANCE_COST,insurance:1},'獲得幸運保險卡！可擋一次陷害'), p.money<INSURANCE_COST));
  opts.append(optRow('plain','🚪 離開銀行','',()=>resolveEvent(p,{},'')));
}
function openStart(p){
  const opts=modalShell(p,'🏁','夢想起點','抵達夢想起點！請領取實體 200 元（系統不記錄金錢）。');
  opts.append(optRow('info','🏁 已領 200 元，繼續冒險','實體+200元',()=>{ sfx.pass(); resolveEvent(p,{},'請發給 '+p.name+' 實體 200 元'); }));
}
function openPark(p){
  const cfg=G.config.tiles.park; const opts=modalShell(p,'🌳','公園格','來到公園～要挑戰一題公園小任務，還是直接休息呢？');
  opts.append(optRow('good','📝 做公園題目', effText(cfg.doEffect), ()=>parkQuestion(p)));
  opts.append(optRow('plain','🌳 直接休息', effText(cfg.skipEffect), ()=>resolveEvent(p, effOf(cfg.skipEffect), '在公園休息')));
}
function parkQuestion(p){
  const cfg=G.config.tiles.park; const q=cfg.questions.length?cfg.questions[Math.floor(Math.random()*cfg.questions.length)]:'（尚未設定題目）';
  const opts=modalShell(p,'🌳📝','公園小任務', '<b>'+escapeHtml(q)+'</b>');
  opts.append(optRow('good','✅ 完成題目', effText(cfg.doEffect), ()=>resolveEvent(p, effOf(cfg.doEffect), '完成公園任務')));
}

/* ---- 挑戰格：題目 + 倒數（暫停/開始） ---- */
let chId=null, chRemain=0, chTotal=0, chRunning=false;
function chDraw(){ const n=$('chNum'), ring=$('chRing'); if(!n) return; n.textContent=chRemain; if(ring) ring.style.setProperty('--deg',(chTotal?chRemain/chTotal*360:0)+'deg'); }
function stopCh(){ chRunning=false; if(chId){ clearInterval(chId); chId=null; } }
function openChallenge(p){
  const cfg=G.config.tiles.challenge; const q=cfg.questions.length?cfg.questions[Math.floor(Math.random()*cfg.questions.length)]:'（尚未設定題目）';
  chTotal=cfg.timerSec||60; chRemain=chTotal; stopCh();
  const layer=$('modalLayer');
  layer.innerHTML=`<div class="modal"><div class="m-emoji">⚔️</div><div class="m-title" style="color:${p.color}">挑戰格 · 腦力激盪</div><div class="m-who">${teamTag(p)}</div><div class="m-text"><b>${escapeHtml(q)}</b></div>
    <div class="ch-timer"><div class="ring" id="chRing"><span id="chNum">${chRemain}</span></div><div class="ch-btns"><button id="chToggle">▶ 開始</button><button id="chReset">↺ 重設</button></div></div>
    <div class="m-opts" id="mOpts"></div></div>`;
  layer.classList.remove('hidden'); chDraw();
  const opts=$('mOpts'); cfg.items.forEach(it=> opts.append(optRow(optCls(it), it.label, effText(it), ()=>resolveEvent(p, effOf(it), '挑戰結算'))));
  $('chToggle').onclick=()=>{
    if(chRunning){ stopCh(); $('chToggle').textContent='▶ 繼續'; }
    else{ chRunning=true; $('chToggle').textContent='⏸ 暫停'; chId=setInterval(()=>{ chRemain--; if(chRemain<=0){ chRemain=0; chDraw(); stopCh(); sfx.medical(); const t=$('chToggle'); if(t) t.textContent='⏱ 時間到'; } else { chDraw(); if(chRemain<=5) sfx.step(); } },1000); }
  };
  $('chReset').onclick=()=>{ stopCh(); chRemain=chTotal; chDraw(); const t=$('chToggle'); if(t) t.textContent='▶ 開始'; };
}

/* ---- 命運格：慢速抽卡 + 自身/陷害二選一 ---- */
function openChance(p){
  const cfg=G.config.tiles.chance; const layer=$('modalLayer');
  layer.innerHTML=`<div class="modal"><div class="draw-spin">🎴</div><div class="m-title" style="color:${p.color}">抽取命運卡…</div><div class="m-text" id="drawDots">洗牌中</div></div>`;
  layer.classList.remove('hidden');
  let k=0; const ti=setInterval(()=>{ sfx.step(); k++; const d=$('drawDots'); if(d) d.textContent='洗牌中'+'.'.repeat(k%4); },240);
  setTimeout(()=>{
    clearInterval(ti);
    const selfC=cfg.cards[Math.floor(Math.random()*cfg.cards.length)];
    const sab=cfg.sabotage[Math.floor(Math.random()*cfg.sabotage.length)];
    const others=G.players.filter(x=>x.id!==p.id);
    const target=others[Math.floor(Math.random()*others.length)];
    revealChance(p, selfC, sab, target);
  }, cfg.drawMs||1600);
}
function sabText(c){ const a=[]; if(c.money) a.push('搶 💰'+c.money); if(c.happy) a.push('搶 💖'+c.happy); if(c.growth) a.push('搶 🌱'+c.growth); return a.join(' '); }
function revealChance(p, selfC, sab, target){
  const opts=modalShell(p,'🎲','命運格 · 二選一', '抽到兩張卡，請選一張：');
  opts.append(optRow('special','😇 自身：'+escapeHtml(selfC.text), effText(selfC), ()=>resolveEvent(p, effOf(selfC), '命運卡結算')));
  opts.append(optRow('evil','😈 陷害 '+teamTag(target)+'：'+escapeHtml(sab.text), sabText(sab), ()=>{
    snapshot();
    if(target.insurance>0){ target.insurance--; sfx.buy(); renderDash(); bump(target.id); toast('🛡️ '+target.name+' 用保險卡擋下了陷害！'); }
    else { applySabotage(p, target, sab); sfx.evil(); toast('😈 '+p.name+' 陷害了 '+target.name+'！'); }
    G.turn.resolved=true; closeModal(); renderButtons();
  }));
}
function applySabotage(actor, target, card){
  let gm=0,gh=0,gg=0;
  if(card.money){ target.money-=card.money; gm=card.money; }
  if(card.happy){ gh=Math.min(card.happy, target.happy); target.happy=clamp(target.happy-card.happy); }
  if(card.growth){ gg=Math.min(card.growth, target.growth); target.growth=clamp(target.growth-card.growth); }
  actor.money+=gm; actor.happy=clamp(actor.happy+gh); actor.growth=clamp(actor.growth+gg);
  renderDash(); bump(actor.id); bump(target.id);
}

function closeModal(){ stopCh(); $('modalLayer').classList.add('hidden'); $('modalLayer').innerHTML=''; }

/* ---- 結算 ---- */
$('btnFinish').onclick=()=>{ sfx.click(); if(confirm('確定結束遊戲並進行結算嗎？')) endGame(); };
function totalScore(p){ const fb=p.fragments.every(f=>f.got)?SC_FRAG:0; return p.happy*SC_HAPPY + p.growth*SC_GROWTH + fb + p.money; }
function endGame(){
  closeModal();
  const ranked=G.players.map(p=>({...p, total:totalScore(p), fragDone:p.fragments.every(f=>f.got)})).sort((a,b)=>b.total-a.total);
  const champ=ranked[0]; let rows='';
  ranked.forEach((p,i)=>{ const medal=['🥇','🥈','🥉'][i]||`${i+1}`; const fb=p.fragDone?SC_FRAG:0;
    rows+=`<div class="res-row"><span class="r-rank">${medal}</span><span class="disc-inline" style="background:${p.color}">${p.id+1}</span><span class="r-name" style="color:${p.color}">${escapeHtml(p.name)}</span><span class="r-break">💖${p.happy}×100 + 🌱${p.growth}×200 ${fb?'+ 🧩500 ':''}+ 💰${p.money}</span><span class="r-total">${p.total}</span></div>`; });
  $('results').innerHTML=`<div class="res-card"><h2>🏆 冒險結算 🏆</h2>
    <div class="champ"><div class="c-disc" style="background:${champ.color}">${champ.id+1}</div><div class="c-name" style="color:${champ.color}">總冠軍：${escapeHtml(champ.name)}</div><div style="font-size:20px;color:var(--ink-soft);margin-top:4px;">總分 ${champ.total} 分</div></div>
    ${rows}<button class="res-again" onclick="restart()">🔄 再玩一次</button></div>`;
  $('results').classList.remove('hidden'); sfx.win(); bigConfetti();
}

/* ===== 設定儲存：localStorage + Firestore ===== */
const LS_KEY='rabbitAdventureSetup_v2';
const CLOUD_DOC = db ? db.collection('config').doc('teacherSettings') : null;
let _resetting=false;
function setCloudStatus(t){ const e=$('cloudStatus'); if(e) e.textContent=t; }
function saveLocal(){ if(_resetting) return; try{ localStorage.setItem(LS_KEY, JSON.stringify(setup)); }catch(e){} }
let _cloudTimer=null;
function saveCloud(){ if(_resetting||!CLOUD_DOC) return; clearTimeout(_cloudTimer); _cloudTimer=setTimeout(()=>{ setCloudStatus('☁️ 同步中…'); CLOUD_DOC.set({data:JSON.stringify(setup),updatedAt:Date.now()}).then(()=>setCloudStatus('☁️ 已同步雲端')).catch(e=>{ console.warn(e); setCloudStatus('⚠️ 雲端同步失敗（仍存本機）'); }); },700); }
function saveSetup(){ saveLocal(); saveCloud(); }
let _saveTimer=null;
function autoSave(){ clearTimeout(_saveTimer); _saveTimer=setTimeout(saveLocal,400); saveCloud(); }
function normalizeTiles(t){
  const d=DEFAULT_TILES();
  try{
    if(t.shop){ if(t.shop.text) d.shop.text=t.shop.text; if(Array.isArray(t.shop.items)&&t.shop.items.length) d.shop.items=t.shop.items; }
    if(t.challenge){ if(typeof t.challenge.timerSec==='number') d.challenge.timerSec=t.challenge.timerSec; if(Array.isArray(t.challenge.questions)&&t.challenge.questions.length) d.challenge.questions=t.challenge.questions; if(Array.isArray(t.challenge.items)&&t.challenge.items.length) d.challenge.items=t.challenge.items; }
    if(t.charity){ if(t.charity.text) d.charity.text=t.charity.text; if(Array.isArray(t.charity.items)&&t.charity.items.length) d.charity.items=t.charity.items; }
    if(t.chance){ if(typeof t.chance.drawMs==='number') d.chance.drawMs=t.chance.drawMs; if(Array.isArray(t.chance.cards)&&t.chance.cards.length) d.chance.cards=t.chance.cards; if(Array.isArray(t.chance.sabotage)&&t.chance.sabotage.length) d.chance.sabotage=t.chance.sabotage; }
    if(t.park){ if(Array.isArray(t.park.questions)&&t.park.questions.length) d.park.questions=t.park.questions; if(t.park.doEffect) d.park.doEffect=t.park.doEffect; if(t.park.skipEffect) d.park.skipEffect=t.park.skipEffect; }
  }catch(e){}
  return d;
}
function applyLoaded(s){
  if(!s||typeof s!=='object') return;
  if(typeof s.maxRounds==='number') setup.maxRounds=s.maxRounds;
  setup.customRound=!!s.customRound;
  if(Array.isArray(s.teams)&&s.teams.length>=2) setup.teams=s.teams.slice(0,8).map((t,i)=>({name:t.name||('第'+(i+1)+'組'), color:TEAM_COLORS[i]}));
  if(typeof s.totalTiles==='number') setup.totalTiles=s.totalTiles;
  if(s.weights) setup.weights={...DEFAULT_WEIGHTS, ...s.weights};
  if(s.tiles) setup.tiles=normalizeTiles(s.tiles);
}
function loadLocal(){ try{ const raw=localStorage.getItem(LS_KEY); if(raw) applyLoaded(JSON.parse(raw)); }catch(e){} }
function applySetupToUI(){
  $('totalTiles').value=setup.totalTiles;
  if(setup.customRound){ $('customRound').value=setup.maxRounds; $('customRoundRow').style.display='flex'; } else $('customRoundRow').style.display='none';
  renderRoundPills(); renderTeams(); renderWeights(); renderTileEditor();
}
function loadFromCloud(){
  if(!CLOUD_DOC){ setCloudStatus('（未連雲端，僅存本機）'); return; }
  setCloudStatus('☁️ 讀取雲端設定…');
  CLOUD_DOC.get().then(doc=>{
    if(doc.exists && doc.data() && doc.data().data){ try{ applyLoaded(JSON.parse(doc.data().data)); applySetupToUI(); }catch(e){} setCloudStatus('☁️ 已從雲端載入設定'); }
    else{ setCloudStatus('☁️ 雲端尚無設定，將自動建立'); saveCloud(); }
  }).catch(e=>{ console.warn(e); setCloudStatus('⚠️ 讀取雲端失敗（改用本機）'); });
}

loadLocal(); applySetupToUI(); loadFromCloud();
['input','change','click'].forEach(ev=> $('setup').addEventListener(ev, autoSave));
$('resetSetup').onclick=()=>{ if(confirm('確定清除已記憶的設定，回復成預設值嗎？（雲端也會清除）')){ _resetting=true; try{ localStorage.removeItem(LS_KEY); }catch(e){} if(CLOUD_DOC) CLOUD_DOC.delete().catch(()=>{}); location.reload(); } };

/* ===== 全螢幕 ===== */
function toggleFullscreen(){ const el2=document.documentElement; if(!document.fullscreenElement && !document.webkitFullscreenElement){ (el2.requestFullscreen||el2.webkitRequestFullscreen||function(){}).call(el2); } else { (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document); } }
function updateFsLabel(){ const on=!!(document.fullscreenElement||document.webkitFullscreenElement); document.querySelectorAll('.fs-btn').forEach(b=> b.textContent=on?'⛶ 離開全螢幕':'⛶ 全螢幕'); }
document.addEventListener('fullscreenchange', updateFsLabel);
document.addEventListener('webkitfullscreenchange', updateFsLabel);
document.querySelectorAll('.fs-btn').forEach(b=> b.onclick=toggleFullscreen);

/* ===== 音效開關 / 開始 ===== */
$('startGame').onclick=()=>{ Sound.ensure(); gameStart(); };
$('btnMute').onclick=()=>{ const on=!Sound.isEnabled(); Sound.setEnabled(on); if(on){ Sound.ensure(); Sound.click(); } $('btnMute').textContent=on?'🔊 音效：開':'🔇 音效：關'; };

/* ===== Confetti ===== */
const cv=$('confetti'), cx=cv.getContext('2d'); let parts=[], ctimer=null;
function csize(){ cv.width=innerWidth; cv.height=innerHeight; } addEventListener('resize',csize); csize();
addEventListener('resize',()=>{ if(G && !$('game').classList.contains('hidden')) buildBoard(); });
function spawn(n){ const cols=['#ff9eb5','#ffb38a','#8fd6a6','#8ec7f0','#c7a9f0','#ffd97a']; for(let i=0;i<n;i++) parts.push({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*0.3,vx:(Math.random()-.5)*3,vy:2+Math.random()*4,size:6+Math.random()*8,color:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*6,vr:(Math.random()-.5)*.3,life:0}); }
function runConfetti(){ cv.classList.remove('hidden'); if(ctimer) return; ctimer=setInterval(()=>{ cx.clearRect(0,0,cv.width,cv.height); parts.forEach(p=>{ p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.rot+=p.vr;p.life++; cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);cx.fillStyle=p.color;cx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.6);cx.restore(); }); parts=parts.filter(p=>p.y<cv.height+30&&p.life<420); if(!parts.length){ clearInterval(ctimer); ctimer=null; cv.classList.add('hidden'); } },1000/45); }
function bigConfetti(){ spawn(180); runConfetti(); }

/* ===== 工具 ===== */
function restart(){ G=null; location.reload(); }
function clamp(v){ return Math.max(0,Math.min(10,v)); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
let _tt=null;
function toast(msg,warn){ const t=$('toast'); t.textContent=msg; t.className='toast show'+(warn?' warn':''); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2400); }

window.addEventListener('beforeunload', e=>{ saveSetup(); if(G){ e.preventDefault(); e.returnValue=''; return ''; } });
</script>
