<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兔子錢大冒險：我的理財日記</title>
<style>
:root{
  --paper:#fff8f0; --paper2:#fdeede;
  --ink:#5b4636; --ink-soft:#8a7563;
  --pink:#ff9eb5; --pink-d:#f06292;
  --peach:#ffb38a; --peach-d:#ff8a5c;
  --mint:#8fd6a6; --mint-d:#4caf7d;
  --sky:#8ec7f0; --sky-d:#4fa8e0;
  --lilac:#c7a9f0; --lilac-d:#9575cd;
  --sun:#ffd97a; --sun-d:#f5b921;
  --danger:#ff6b57; --danger-d:#e2503b;
  /* 屬性色 */
  --c-money:#f5b921; --c-happy:#ff8fb0; --c-growth:#6fcf97; --c-health:#ff8a5c;
  --shadow:0 6px 16px rgba(120,90,60,.18);
  --shadow-s:0 3px 8px rgba(120,90,60,.16);
  --radius:20px;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
  font-family:"Baloo 2","Comic Sans MS","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  color:var(--ink); overflow:hidden;
  background:
    radial-gradient(circle at 12% 15%, #ffe9d6 0, transparent 40%),
    radial-gradient(circle at 88% 85%, #ffe0ea 0, transparent 42%),
    linear-gradient(160deg,#fff6ec,#fdeef4);
}
button{font-family:inherit;cursor:pointer;border:none;}
.hidden{display:none !important;}
::-webkit-scrollbar{height:10px;width:10px;}
::-webkit-scrollbar-thumb{background:#e6cdb5;border-radius:10px;}

/* ============ 通用手繪卡片 ============ */
.hand{ border:3px solid #fff; box-shadow:var(--shadow); border-radius:var(--radius); background:var(--paper);}

/* ==================================================
   設定畫面
=================================================== */
#setup{ height:100%; overflow-y:auto; padding:26px 18px 60px;}
.setup-wrap{ max-width:960px; margin:0 auto;}
.title-card{ text-align:center; padding:22px; margin-bottom:20px;}
.title-card h1{ margin:0; font-size:40px; color:var(--peach-d); letter-spacing:1px; transform:rotate(-1deg);}
.title-card p{ margin:8px 0 0; color:var(--ink-soft); font-size:16px;}
.sec{ padding:20px 24px; margin-bottom:18px;}
.sec > h2{ margin:0 0 14px; font-size:22px; color:var(--peach-d); display:flex; align-items:center; gap:8px;}
.row{ display:flex; flex-wrap:wrap; gap:10px; align-items:center;}
.pill{ border:2px solid var(--peach); background:#fff; color:var(--ink); padding:8px 18px; border-radius:999px; font-size:16px; font-weight:700;}
.pill.active{ background:var(--peach); color:#fff;}
input[type=number],input[type=text]{ font-family:inherit; font-size:15px; padding:8px 12px; border:2px solid var(--paper2); border-radius:12px; background:#fff; color:var(--ink);}
input:focus{ outline:none; border-color:var(--sky-d);}

/* 角色庫 */
.char-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px;}
.char-card{ border:3px solid var(--paper2); border-radius:18px; background:#fff; padding:14px; text-align:center; transition:transform .12s; position:relative; cursor:pointer;}
.char-card.on{ border-color:var(--mint-d); box-shadow:0 0 0 3px rgba(111,207,151,.3);}
.char-card:hover{ transform:translateY(-3px);}
.char-card .cc-emoji{ font-size:52px; line-height:1;}
.char-card .cc-name{ margin-top:6px;}
.char-card .cc-name input{ width:100%; text-align:center; font-weight:800; font-size:16px; border-color:transparent; background:transparent;}
.char-card .cc-name input:focus{ background:#fff; border-color:var(--sky-d);}
.char-card .cc-frag{ margin-top:8px; font-size:12px; color:var(--ink-soft); line-height:1.5;}
.char-card .cc-badge{ position:absolute; top:8px; right:8px; font-size:13px; font-weight:800; padding:2px 10px; border-radius:999px;}
.char-card.on .cc-badge{ background:var(--mint-d); color:#fff;}
.char-card:not(.on) .cc-badge{ background:#e6ddd3; color:var(--ink-soft);}
.char-card .cc-init{ margin-top:6px; font-size:12px; color:var(--sun-d); font-weight:700;}

/* 地圖比例 */
.weights{ display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px;}
.w-item{ background:#fff; border:2px solid var(--paper2); border-radius:14px; padding:10px 12px;}
.w-item .w-top{ display:flex; justify-content:space-between; font-weight:800;}
.w-item input[type=range]{ width:100%; margin-top:6px; accent-color:var(--peach-d);}

/* 格子內容編輯器 */
.tile-group{ border:2px solid var(--paper2); border-radius:14px; padding:12px 14px; margin-bottom:12px; background:#fff;}
.tg-head{ font-weight:900; font-size:17px; margin-bottom:8px; color:var(--peach-d);}
.tg-textrow{ display:flex; align-items:center; gap:8px; margin-bottom:10px;}
.tg-textrow > span{ font-size:14px; color:var(--ink-soft); white-space:nowrap;}
.tg-text{ flex:1; min-width:120px;}
.tg-list{ display:flex; flex-direction:column; gap:8px;}
.opt-row{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:var(--paper); border-radius:10px; padding:6px 8px;}
.opt-label{ flex:1; min-width:150px;}
.opt-num{ display:inline-flex; align-items:center; gap:2px; font-size:13px;}
.opt-num input{ width:58px; padding:5px 6px;}
.opt-frag{ display:inline-flex; align-items:center; gap:3px; font-size:13px; white-space:nowrap;}
.opt-del{ background:var(--danger); color:#fff; width:28px; height:28px; border-radius:8px; font-size:14px; flex:none;}
.opt-add{ margin-top:8px; border:2px dashed var(--peach-d); background:#fff6ef; color:var(--peach-d); border-radius:10px; padding:8px 14px; font-weight:800;}

.fs-btn{ border:2px solid var(--paper2); background:#fff; color:var(--ink); border-radius:12px; padding:9px 16px; font-weight:800; font-size:15px; box-shadow:var(--shadow-s);}
.mini-btn{ border:2px solid var(--danger); background:#fff; color:var(--danger-d); border-radius:12px; padding:9px 16px; font-weight:800; font-size:15px;}
.save-note{ font-size:13px; color:var(--mint-d); font-weight:700;}
.big-start{ width:100%; padding:18px; font-size:26px; font-weight:900; color:#fff; border-radius:20px;
  background:linear-gradient(180deg,var(--mint),var(--mint-d)); box-shadow:var(--shadow); margin-top:6px;}
.big-start:hover{ filter:brightness(1.05);}

/* ==================================================
   遊戲畫面
=================================================== */
#game{ height:100%; display:flex; flex-direction:column;}
#gtop{ display:flex; align-items:center; gap:14px; padding:10px 18px;}
#gtop .g-title{ font-size:22px; font-weight:900; color:var(--peach-d);}
.round-chip{ background:#fff; border:3px solid var(--sky-d); color:var(--sky-d); font-weight:800; font-size:18px; padding:6px 16px; border-radius:14px; box-shadow:var(--shadow-s);}
.turn-banner{ flex:1; text-align:center; font-size:24px; font-weight:900; color:#fff; padding:8px 14px; border-radius:16px; box-shadow:var(--shadow-s); transition:background .3s;}

#gmid{ flex:1; display:flex; min-height:0; padding:0 14px 8px; gap:14px;}
#mapArea{ flex:1; display:flex; align-items:center; justify-content:center; position:relative; min-width:0;}
#board{ display:grid; gap:5px;}
.tile{ border-radius:12px; position:relative; padding:3px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  border:2px solid rgba(255,255,255,.75); box-shadow:0 2px 5px rgba(120,90,60,.15);}
.tile .t-no{ position:absolute; top:1px; left:4px; font-size:calc(var(--tile,64px)*0.14); opacity:.45;}
.tile .t-emoji{ font-size:calc(var(--tile,64px)*0.46); line-height:1.02;}
.tile .t-label{ font-size:calc(var(--tile,64px)*0.20); font-weight:800; margin-top:1px; text-align:center; line-height:1.05;}
.tile .t-tokens{ position:absolute; inset:0; display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:2px; pointer-events:none;}
.tk{ width:calc(var(--tile,64px)*0.40); height:calc(var(--tile,64px)*0.40); border-radius:50%; border:3px solid #fff; display:flex; align-items:center; justify-content:center; font-size:calc(var(--tile,64px)*0.26); box-shadow:0 2px 5px rgba(0,0,0,.35); transition:transform .15s;}
.tk.moving{ transform:scale(1.5); z-index:6; box-shadow:0 0 0 4px var(--sun),0 4px 10px rgba(0,0,0,.4);}
.t-start{background:#fff3c4;} .t-shop{background:#ffd3b6;} .t-challenge{background:#ffb3ba;}
.t-bank{background:#bae1ff;} .t-charity{background:#ffc4e1;} .t-park{background:#c4f5cf;} .t-chance{background:#e0c3fc;}
.board-center{ background:linear-gradient(135deg,#fffdf6,#fdf1e4); border:3px dashed #f0d3b8; border-radius:24px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:inset 0 0 22px rgba(245,185,33,.12);}
.board-center .bc-dice{ font-size:66px;} .bc-dice.rolling{ animation:shake .25s infinite;}
@keyframes shake{25%{transform:rotate(-16deg) scale(1.1);}75%{transform:rotate(16deg) scale(1.1);}}
.board-center .bc-title{ font-size:20px; font-weight:900; color:var(--peach-d);}
.board-center .bc-sub{ font-size:13px; color:var(--ink-soft); margin-top:2px; text-align:center; padding:0 8px;}

/* 教師控制面板 */
#control{ width:210px; flex:none; display:flex; flex-direction:column; gap:10px; padding:14px;}
#control h3{ margin:0 0 2px; font-size:13px; color:var(--ink-soft);}
.cbtn{ width:100%; padding:14px 8px; font-size:18px; font-weight:900; color:#fff; border-radius:14px; box-shadow:var(--shadow-s); line-height:1.15;}
.cbtn:active{ transform:translateY(1px);}
.cbtn:disabled{ opacity:.4; box-shadow:none;}
.cbtn.roll{ background:var(--sky-d); font-size:22px; padding:18px 8px;}
.cbtn.end{ background:var(--peach-d);}
.cbtn.finish{ background:var(--danger-d);}
.cbtn.undo{ background:#b0a190; font-size:15px; padding:11px 8px;}
.ctrl-dice{ text-align:center; background:#fff; border-radius:14px; padding:8px; box-shadow:var(--shadow-s);}
.ctrl-dice .cd-face{ font-size:44px;}
.ctrl-dice .cd-txt{ font-size:13px; color:var(--ink-soft);}

/* 儀表板 */
#dash{ display:flex; gap:10px; padding:8px 14px 12px; overflow-x:auto;}
.pcard{ flex:1; min-width:190px; background:#fff; border:3px solid var(--paper2); border-radius:18px; padding:10px 12px; position:relative; transition:transform .12s;}
.pcard.active{ border-color:var(--sun-d); box-shadow:0 0 0 3px rgba(245,185,33,.35), var(--shadow-s); transform:translateY(-4px);}
.pcard.paused{ opacity:.6;}
.pcard.bump{ animation:bump .4s;}
@keyframes bump{ 30%{transform:scale(1.05);} }
.pc-head{ display:flex; align-items:center; gap:8px;}
.pc-avatar{ font-size:34px; line-height:1;}
.pc-name{ font-weight:900; font-size:16px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.pc-money{ background:#fff6d9; color:var(--sun-d); font-weight:900; font-size:15px; padding:2px 8px; border-radius:10px; white-space:nowrap;}
.pc-money.neg{ background:#ffe0da; color:var(--danger-d);}
.pc-bars{ margin-top:8px; display:flex; flex-direction:column; gap:5px;}
.bar{ display:flex; align-items:center; gap:6px; font-size:12px;}
.bar .b-ico{ width:18px; text-align:center;}
.bar .b-cells{ flex:1; display:flex; gap:2px;}
.seg{ flex:1; height:15px; border-radius:4px; background:#efe6db; box-shadow:inset 0 0 0 1px rgba(120,90,60,.06); transition:background .2s, transform .2s;}
.seg.on{ transform:scaleY(1.02);}
.seg.on.happy{background:var(--c-happy);}
.seg.on.growth{background:var(--c-growth);}
.seg.on.health{background:var(--c-health);}
.bar .b-val{ width:30px; text-align:right; font-weight:800;}
.pc-frags{ margin-top:8px; display:flex; gap:6px; align-items:center;}
.frag{ width:26px; height:26px; border-radius:50%; border:2px dashed #d9c8b6; display:flex; align-items:center; justify-content:center; font-size:14px; color:#cbb9a6;}
.frag.got{ border:2px solid var(--mint-d); background:#e8f8ee; color:var(--mint-d);}
.pc-badges{ position:absolute; top:8px; right:10px; display:flex; gap:4px;}
.badge{ font-size:11px; font-weight:800; padding:2px 7px; border-radius:999px;}
.badge.vip{ background:#fff3c4; color:var(--sun-d);}
.badge.pause{ background:#ffe0da; color:var(--danger-d);}

/* ==================================================
   互動彈窗
=================================================== */
#modalLayer{ position:absolute; inset:0; z-index:60; background:rgba(91,70,54,.42); display:flex; align-items:center; justify-content:center; padding:20px;}
.modal{ background:var(--paper); border:4px solid #fff; border-radius:26px; box-shadow:var(--shadow); max-width:560px; width:100%; padding:24px 28px; text-align:center; animation:pop .3s cubic-bezier(.2,1.4,.5,1);}
@keyframes pop{ from{transform:scale(.7); opacity:0;} }
.modal .m-emoji{ font-size:64px;}
.modal .m-title{ font-size:28px; font-weight:900; margin:4px 0;}
.modal .m-who{ font-size:15px; color:var(--ink-soft);}
.modal .m-text{ font-size:18px; color:var(--ink); line-height:1.45; margin:10px 4px;}
.m-opts{ display:flex; flex-direction:column; gap:10px; margin-top:16px;}
.opt{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 18px; border-radius:16px; font-size:17px; font-weight:800; color:#fff; box-shadow:var(--shadow-s); text-align:left;}
.opt:disabled{ opacity:.45; box-shadow:none;}
.opt .o-eff{ font-size:14px; font-weight:800; background:rgba(255,255,255,.28); padding:3px 10px; border-radius:999px; white-space:nowrap;}
.opt.buy{background:var(--peach-d);} .opt.good{background:var(--mint-d);} .opt.info{background:var(--sky-d);}
.opt.warn{background:var(--danger-d);} .opt.plain{background:#b0a190;} .opt.special{background:var(--lilac-d);}

/* ==================================================
   結算
=================================================== */
#results{ position:absolute; inset:0; z-index:70; background:linear-gradient(160deg,#fff2d6,#ffe1ec); display:flex; align-items:center; justify-content:center; padding:20px; overflow:auto;}
.res-card{ background:var(--paper); border:4px solid #fff; border-radius:28px; box-shadow:var(--shadow); padding:26px 30px; max-width:720px; width:100%;}
.res-card h2{ text-align:center; font-size:34px; margin:0 0 6px; color:var(--peach-d);}
.res-card .champ{ text-align:center; margin:8px 0 18px;}
.res-card .champ .c-emoji{ font-size:80px;} .res-card .champ .c-name{ font-size:34px; font-weight:900;}
.res-row{ display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:14px; font-size:18px;}
.res-row:nth-child(even){ background:#fff;}
.res-row .r-rank{ font-size:26px; width:44px; text-align:center;}
.res-row .r-emoji{ font-size:26px;}
.res-row .r-name{ flex:1; font-weight:800;}
.res-row .r-break{ font-size:13px; color:var(--ink-soft); min-width:230px; text-align:right;}
.res-row .r-total{ font-size:24px; font-weight:900; color:var(--mint-d); min-width:90px; text-align:right;}
.res-again{ display:block; margin:20px auto 0; padding:14px 40px; font-size:20px; font-weight:900; color:#fff; border-radius:16px; background:var(--mint-d); box-shadow:var(--shadow);}

#confetti{ position:fixed; inset:0; z-index:120; pointer-events:none;}
.toast{ position:absolute; bottom:16px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 22px; border-radius:999px; font-weight:800; z-index:80; box-shadow:var(--shadow); opacity:0; transition:opacity .3s; max-width:80%; text-align:center;}
.toast.show{ opacity:1;}
.toast.warn{ background:var(--danger-d);}
</style>
</head>
<body>

<!-- ===================== 設定 ===================== -->
<div id="setup">
  <div class="setup-wrap">
    <div class="title-card hand">
      <h1>🐰 兔子錢大冒險 💰</h1>
      <p>我的理財日記 · 課堂單機主控版 · 老師操作投影大螢幕</p>
    </div>

    <div class="sec hand">
      <h2>⏳ 遊戲長度（最大回合數）</h2>
      <div class="row" id="roundPills"></div>
      <div class="row" id="customRoundRow" style="margin-top:10px;display:none;">
        <span>自訂回合：</span><input type="number" id="customRound" min="1" max="30" value="6" style="width:90px;">
      </div>
    </div>

    <div class="sec hand">
      <h2>🎭 選擇上場角色 <span style="font-size:14px;color:var(--ink-soft);font-weight:400;">（點卡片上/下場，2～6 名，可改名）</span></h2>
      <div class="char-grid" id="charGrid"></div>
    </div>

    <div class="sec hand">
      <h2>🗺️ 地圖格子比例</h2>
      <div class="row" style="margin-bottom:12px;">
        <span>地圖總格數：</span><input type="number" id="totalTiles" min="12" max="36" step="4" value="24" style="width:90px;">
        <span style="font-size:13px;color:var(--ink-soft);">（4 的倍數，環形地圖剛好排滿，設幾格就是幾格）</span>
      </div>
      <div class="weights" id="weights"></div>
    </div>

    <div class="sec hand">
      <h2>🎪 格子內容設定 <span style="font-size:14px;color:var(--ink-soft);font-weight:400;">（商店 / 挑戰 / 命運 / 愛心 可自由編輯文字與數值）</span></h2>
      <div id="tileEditor"></div>
    </div>

    <div class="row" style="gap:12px; margin-bottom:12px; align-items:center;">
      <button class="fs-btn" id="fsBtnSetup">⛶ 全螢幕</button>
      <button class="mini-btn" id="resetSetup">↺ 回復預設設定</button>
      <span class="save-note">✅ 設定自動存本機＋雲端 · <span id="cloudStatus">…</span></span>
    </div>

    <button class="big-start" id="startGame">▶ 開始冒險</button>
  </div>
</div>

<!-- ===================== 遊戲 ===================== -->
<div id="game" class="hidden">
  <div id="gtop">
    <div class="g-title">🐰 兔子錢大冒險</div>
    <div class="round-chip" id="roundChip">第 1 / 6 回合</div>
    <div class="turn-banner" id="turnBanner">準備開始</div>
  </div>

  <div id="gmid">
    <div id="mapArea">
      <div id="board"></div>
      <div id="modalLayer" class="hidden"></div>
      <div id="results" class="hidden"></div>
      <div class="toast" id="toast"></div>
    </div>
    <div id="control" class="hand">
      <div class="ctrl-dice">
        <div class="cd-face" id="ctrlDice">🎲</div>
        <div class="cd-txt" id="ctrlDiceTxt">準備擲骰</div>
      </div>
      <div>
        <h3>擲骰移動</h3>
        <button class="cbtn roll" id="btnRoll">🎲 擲骰子</button>
      </div>
      <div>
        <h3>回合控制</h3>
        <button class="cbtn end" id="btnEnd">➡ 結束回合</button>
      </div>
      <button class="cbtn undo" id="btnUndo">↩ 復原上一步</button>
      <button class="cbtn finish" id="btnFinish">⏹ 結束並結算</button>
      <button class="cbtn" id="btnMute" style="background:#9c8a76;font-size:15px;padding:11px 8px;">🔊 音效：開</button>
      <button class="cbtn fs-btn" style="background:#7fa9c9;font-size:15px;padding:11px 8px;">⛶ 全螢幕</button>
    </div>
  </div>

  <div id="dash"></div>
</div>

<canvas id="confetti" class="hidden"></canvas>

<script>
"use strict";
const $ = id => document.getElementById(id);

/* ==================================================
   音效（Web Audio 合成，免外部檔、離線可用）
=================================================== */
const Sound = (()=>{
  let ctx=null, enabled=true;
  function ensure(){
    if(!ctx){ try{ ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
    if(ctx.state==='suspended') ctx.resume();
    return ctx;
  }
  function note(freq,start,dur,type='sine',vol=0.2){
    const c=ensure(); if(!c||!enabled) return;
    const o=c.createOscillator(), g=c.createGain();
    o.type=type; o.frequency.value=freq;
    const t=c.currentTime+start;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g).connect(c.destination); o.start(t); o.stop(t+dur+0.03);
  }
  const seq=(arr,type,vol)=>arr.forEach(([f,s,d])=>note(f,s,d,type,vol));
  return {
    ensure, setEnabled(v){enabled=v;}, isEnabled(){return enabled;},
    click(){ note(300,0,0.06,'square',0.10); },

function buildMap(total, weights){
  const map=[{type:'start'}];
  const slots=total-1;
  const keys=Object.keys(weights).filter(k=>weights[k]>0);
  const sum=keys.reduce((a,k)=>a+weights[k],0)||1;
  let pool=[];
  keys.forEach(k=>{ const n=Math.round(slots*weights[k]/sum); for(let i=0;i<n;i++) pool.push(k); });
  while(pool.length<slots) pool.push(keys[Math.floor(Math.random()*keys.length)]||'park');
  pool=pool.slice(0,slots);
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  pool.forEach(t=>map.push({type:t}));
  return map;
}

let tileEls=[];
function ringLayout(total){
  const perSide=Math.ceil(total/4), size=perSide+1, ring=[];
  for(let c=0;c<size;c++) ring.push([0,c]);
  for(let r=1;r<size;r++) ring.push([r,size-1]);
  for(let c=size-2;c>=0;c--) ring.push([size-1,c]);
  for(let r=size-2;r>=1;r--) ring.push([r,0]);
  const coords=[];
  for(let i=0;i<total;i++) coords.push(ring[Math.round(i*ring.length/total)%ring.length]);
  return {coords,size};
}
function buildBoard(){
  const board=$('board'); board.innerHTML=''; tileEls=[];
  const map=G.config.map;
  const {coords,size}=ringLayout(map.length);
  const avail=Math.min(window.innerWidth*0.64, window.innerHeight*0.66);
  const px=Math.max(52,Math.min(104,Math.floor((avail-size*5)/size)));
  board.style.setProperty('--tile', px+'px');
  board.style.gridTemplateColumns=`repeat(${size},${px}px)`;
  board.style.gridTemplateRows=`repeat(${size},${px}px)`;
  const center=document.createElement('div');
  center.className='board-center';
  center.style.gridColumn=`2 / ${size}`; center.style.gridRow=`2 / ${size}`;
  center.innerHTML=`<div class="bc-dice" id="bcDice">🎲</div><div class="bc-title">兔子錢大冒險</div><div class="bc-sub" id="bcSub">點「擲骰子」開始</div>`;
  board.appendChild(center);
  map.forEach((t,i)=>{
    const [r,c]=coords[i];
    const el=document.createElement('div');
    el.className='tile t-'+t.type;
    el.style.gridRow=r+1; el.style.gridColumn=c+1;
    el.innerHTML=`<span class="t-no">${i}</span><span class="t-emoji">${TILE[t.type].emoji}</span><span class="t-label">${TILE[t.type].label}</span><div class="t-tokens"></div>`;
    board.appendChild(el); tileEls[i]=el;
  });
  renderTokens();
}
function renderTokens(){
  tileEls.forEach(el=>el.querySelector('.t-tokens').innerHTML='');
  G.players.forEach(p=>{
    const tk=document.createElement('div'); tk.className='tk'; tk.style.background=p.color; tk.textContent=p.emoji; tk.dataset.pid=p.id;

  $('roundChip').textContent=`第 ${G.save.current_round} / ${G.save.max_rounds} 回合`;
  const b=$('turnBanner');
  b.innerHTML=`${p.emoji} 現在輪到 ${escapeHtml(p.name)}`;
  b.style.background=p.color;
}
function bar(ico,key,val){
  let cells='';
  for(let i=0;i<10;i++) cells+=`<span class="seg${i<val?' on '+key:''}"></span>`;
  return `<div class="bar"><span class="b-ico">${ico}</span>
    <span class="b-cells">${cells}</span>
    <span class="b-val">${val}</span></div>`;
}
function renderDash(){
  const dash=$('dash'); dash.innerHTML='';
  G.players.forEach(p=>{
    const card=document.createElement('div');
    card.className='pcard'+(p.id===G.save.current_turn?' active':'')+(p.paused_turns>0?' paused':'');
    card.dataset.pid=p.id;
    const badges=[];
    if(p.is_vip) badges.push('<span class="badge vip">🏦VIP</span>');
    if(p.paused_turns>0) badges.push(`<span class="badge pause">⏸${p.paused_turns}</span>`);
    const frags=p.fragments.map(f=>`<div class="frag${f.got?' got':''}" title="${escapeHtml(f.name)}">${f.got?'🧩':'○'}</div>`).join('');
    card.innerHTML=`
      <div class="pc-badges">${badges.join('')}</div>
      <div class="pc-head">
        <span class="pc-avatar">${p.emoji}</span>
        <span class="pc-name" style="color:${p.color}">${escapeHtml(p.name)}</span>
        <span class="pc-money${p.money<0?' neg':''}">💰${p.money}</span>
      </div>
      <div class="pc-bars">
        ${bar('💖','happy',p.happy)}
        ${bar('🌱','growth',p.growth)}
        ${bar('💪','health',p.health)}
      </div>
      <div class="pc-frags">🧩 ${frags}</div>`;
    dash.appendChild(card);
  });
}
function bump(pid){
  const el=document.querySelector(`.pcard[data-pid="${pid}"]`);
  if(el){ el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump'); }
}
function renderButtons(){
  const playing = G && !$('results').classList.contains('hidden')===false;
  const busy=G.busy;
  $('btnRoll').disabled = busy || G.turn.rolled;
  $('btnEnd').disabled  = busy || !G.turn.rolled || !G.turn.resolved;
  $('btnUndo').disabled = history.length===0 || busy;
}

/* ==================================================
   復原（快照）
=================================================== */
function snapshot(){
  history.push(JSON.stringify({ save:G.save, players:G.players, turn:G.turn, dice:G.dice }));
  if(history.length>50) history.shift();
}
$('btnUndo').onclick=()=>{
  if(!history.length||G.busy) return;
  sfx.click();
  const s=JSON.parse(history.pop());
  G.save=s.save; G.players=s.players; G.turn=s.turn; G.dice=s.dice;
  closeModal(); renderTokens(); refreshAll(); toast('已復原上一步');
};

/* ==================================================
   API: roll / action / end-turn
=================================================== */
// POST /api/game/{save}/player/{id}/roll
$('btnRoll').onclick=async ()=>{
  if(G.busy||G.turn.rolled) return;
  snapshot();
  G.busy=true; renderButtons();
  sfx.dice();
  const bc=$('bcDice'), ctrl=$('ctrlDice');
  bc.classList.add('rolling');
  for(let i=0;i<12;i++){ const f=DICE[Math.floor(Math.random()*6)]; bc.textContent=f; ctrl.textContent=f; await sleep(55); }
  const roll=Math.floor(Math.random()*6)+1;
  bc.classList.remove('rolling'); bc.textContent=DICE[roll-1]; $('ctrlDice').textContent=DICE[roll-1];
  $('ctrlDiceTxt').textContent=cur().name+' 擲出 '+roll+' 點';
  $('bcSub').textContent=cur().name+' 擲出 '+roll+' 點';

  const p=cur();
  let passedStart=false;
  for(let s=1;s<=roll;s++){
    p.position=(p.position+1)%G.config.map.length;
    const tt=G.config.map[p.position].type;
    if(tt==='start') passedStart=true;
    // 中途經過銀行：VIP 自動 +20（系統利息）
    if(s<roll && p.is_vip && tt==='bank'){ p.money+=20; renderDash(); bump(p.id); sfx.gain(); toast('🏦 '+p.name+' VIP 利息 +20 元'); }
    renderTokens(); sfx.step();
    const tk=tileEls[p.position].querySelector(`.tk[data-pid="${p.id}"]`);
    if(tk) tk.classList.add('moving');
    await sleep(300);
    if(tk) tk.classList.remove('moving');
  }
  G.turn.rolled=true; G.turn.resolved=false;
  G.busy=false; renderButtons();
  // 經過（非停留）起點：領取實體 200 元（系統不記錄金錢）
  if(passedStart && G.config.map[p.position].type!=='start'){ sfx.pass(); toast('🏁 '+p.name+' 經過起點！請發實體 200 元（系統不記錄）'); }
  openTileModal(p, G.config.map[p.position]);
};

// POST /api/game/{save}/player/{id}/action  → 套用格子事件
function applyEffect(p, eff){
  if(eff.money) p.money += eff.money;
  if(eff.happy) p.happy = clamp(p.happy+eff.happy);
  if(eff.growth) p.growth = clamp(p.growth+eff.growth);
  if(eff.health) p.health = clamp(p.health+eff.health);
  if(eff.fragment){ const f=p.fragments.find(x=>!x.got); if(f) f.got=true; }
  if(eff.vip) p.is_vip=true;
  if(eff.pause) p.paused_turns += eff.pause;
  renderDash(); bump(p.id);
}
function resolveEvent(p, eff, msg){
  snapshot();
  applyEffect(p, eff);
  G.turn.resolved=true;
  closeModal(); renderButtons();
  if(eff.fragment) sfx.fragment();
  else if(eff.vip) sfx.vip();
  else if(eff.happy>0||eff.growth>0||eff.health>0||eff.money>0) sfx.gain();
  else if(eff.money<0) sfx.buy();
  else sfx.click();
  if(msg) toast(msg);
}

// POST /api/game/{save}/player/{id}/end-turn
$('btnEnd').onclick=()=>{
  if(G.busy||!G.turn.rolled||!G.turn.resolved) return;
  sfx.click();
  snapshot();
  const p=cur();
  // 日常消耗
  p.health=clamp(p.health-1);
  renderDash(); bump(p.id);
  // 強制休養：健康 或 幸福 歸零
  const zero=[];
  if(p.health<=0) zero.push('health');
  if(p.happy<=0) zero.push('happy');
  if(zero.length){
    p.money-=MEDICAL_FEE;
    p.paused_turns+=1;
    zero.forEach(s=>{ if(!p.reviveStats.includes(s)) p.reviveStats.push(s); });
    renderDash(); bump(p.id);
    showCrisisModal(p, zero);
    return; // 等老師按確認後才換人
  }
  advanceTurn();
};
function showCrisisModal(p, zero){
  const hasH=zero.includes('health'), hasHappy=zero.includes('happy');
  const emoji = hasH ? '🚑' : '😢';
  const title = (hasH&&hasHappy) ? '緊急照護！' : hasH ? '強制送醫！' : '心情崩潰，強制休息！';
  const reason = (hasH&&hasHappy) ? '健康值與幸福值都歸零了' : hasH ? '健康值歸零' : '幸福值歸零';
  const reviveTxt = zero.map(s=> s==='health'?'健康值':'幸福值').join('、');
  if(hasH) sfx.medical(); else sfx.sad();
  const layer=$('modalLayer');
  layer.innerHTML=`<div class="modal">
    <div class="m-emoji">${emoji}</div>
    <div class="m-title" style="color:var(--danger-d)">${title}</div>
    <div class="m-who">${p.emoji} ${escapeHtml(p.name)}</div>
    <div class="m-text">${reason}，需要好好休養！<br>扣除照護費 <b>${MEDICAL_FEE} 元</b>，並<b>暫停一回合</b>。<br>暫停結束後 ${reviveTxt} 會恢復為 ${REVIVE_HEALTH}。</div>
    <div class="m-opts"><button class="opt warn" data-x>😢 知道了，換下一位</button></div>
  </div>`;
  layer.classList.remove('hidden');
  layer.querySelector('[data-x]').onclick=()=>{ sfx.click(); closeModal(); advanceTurn(); };
}
function advanceTurn(){
  closeModal();
  let guard=0;
  while(guard++<G.players.length*3){
    G.save.current_turn=(G.save.current_turn+1)%G.players.length;
    if(G.save.current_turn===0){
      G.save.current_round++;
      if(G.save.current_round>G.save.max_rounds){ endGame(); return; }
    }
    const np=G.players[G.save.current_turn];
    if(np.paused_turns>0){
      np.paused_turns--;
      if(np.paused_turns===0){
        const rev=(np.reviveStats&&np.reviveStats.length)?np.reviveStats:['health'];
        rev.forEach(s=>{ np[s]=REVIVE_HEALTH; });
        const revTxt=rev.map(s=> s==='health'?'健康':'幸福').join('、');
        np.reviveStats=[];
        toast('⏰ '+np.name+' 暫停結束，'+revTxt+'恢復為 '+REVIVE_HEALTH);
      }
      else toast('⏸ '+np.name+' 暫停中，跳過本回合');
      renderDash();
      continue;
    }
    break;
  }
  G.turn={rolled:false, resolved:true};
  $('bcDice').textContent='🎲'; $('bcSub').textContent='點「擲骰子」開始';
  $('ctrlDice').textContent='🎲'; $('ctrlDiceTxt').textContent='準備擲骰';
  renderTokens(); refreshAll();
  sfx.turn();
  toast('輪到 '+cur().name+'，請擲骰子！');
}

/* ==================================================
   格子事件彈窗
=================================================== */
function optRow(cls, label, effText, handler, disabled){
  const b=document.createElement('button');
  b.className='opt '+cls; b.disabled=!!disabled;
  b.innerHTML=`<span>${label}</span>${effText?`<span class="o-eff">${effText}</span>`:''}`;
  if(!disabled) b.onclick=handler;
  return b;
}
function effOf(it){ return {money:it.money||0, happy:it.happy||0, growth:it.growth||0, health:it.health||0, fragment:!!it.fragment, pause:it.pause||0}; }
function effText(it){
  const a=[];
  if(it.money) a.push((it.money>0?'+':'')+it.money+'元');
  if(it.happy) a.push('💖'+(it.happy>0?'+':'')+it.happy);
  if(it.growth) a.push('🌱'+(it.growth>0?'+':'')+it.growth);
  if(it.health) a.push('💪'+(it.health>0?'+':'')+it.health);
  if(it.fragment) a.push('🧩碎片');
  if(it.pause) a.push('⏸暫停'+it.pause);
  return a.join(' ');
}
function optCls(it){
  if(it.fragment) return 'special';
  if(it.money<0) return 'buy';
  if(it.money>0||it.happy>0||it.growth>0||it.health>0) return 'good';
  return 'plain';
}
function openTileModal(p, tile){
  const layer=$('modalLayer');
  const info=TILE[tile.type];
  layer.innerHTML=`<div class="modal">
    <div class="m-emoji">${info.emoji}</div>
    <div class="m-title" style="color:${p.color}">${info.label}格</div>
    <div class="m-who">${p.emoji} ${escapeHtml(p.name)}　💰${p.money} 元</div>
    <div class="m-text" id="mText"></div>
    <div class="m-opts" id="mOpts"></div>
  </div>`;
  layer.classList.remove('hidden');
  const text=$('mText'), opts=$('mOpts');

  const afford=cost=>p.money>=cost;

  if(tile.type==='shop'){
    const cfg=G.config.tiles.shop;
    text.textContent=cfg.text;
    const allFrag=p.fragments.every(f=>f.got);
    const nextFrag=p.fragments.find(f=>!f.got);
    cfg.items.forEach(it=>{
      let label=it.label;
      if(it.fragment) label = allFrag ? it.label+'（已集滿）' : it.label+(nextFrag?'：'+nextFrag.name:'');
      const disabled=(it.money<0 && p.money < -it.money) || (it.fragment && allFrag);
      opts.append(optRow(optCls(it), label, effText(it), ()=>resolveEvent(p, effOf(it), '完成購買'), disabled));
    });
    opts.append(optRow('plain','🚪 這次先不買','',()=>resolveEvent(p,{},'離開商店')));
  }
  else if(tile.type==='challenge'){
    const cfg=G.config.tiles.challenge;
    text.textContent=cfg.text;
    cfg.items.forEach(it=>{
      const disabled=(it.money<0 && p.money < -it.money);
      opts.append(optRow(optCls(it), it.label, effText(it), ()=>resolveEvent(p, effOf(it), '挑戰結算'), disabled));
    });
  }
  else if(tile.type==='bank'){
    if(p.is_vip){
      text.textContent='你已經是銀行 VIP 囉！經過起點或銀行都會自動獲得利息 +20 元。';
      opts.append(optRow('info','✅ 好的，繼續冒險','',()=>resolveEvent(p,{},'')));
    }else{
      text.textContent='來到銀行！要不要存 100 元成為 VIP？之後每次經過起點/銀行都會自動 +20 元利息。';
      opts.append(
        optRow('special','🏦 存入 100 元（成為 VIP）','−100元 🏦VIP',
          ()=>resolveEvent(p,{money:-100,vip:true},'成為銀行 VIP！'), !afford(100)),
        optRow('plain','🙅 這次不存','',()=>resolveEvent(p,{},'')),
      );
    }
  }
  else if(tile.type==='charity'){
    const cfg=G.config.tiles.charity;
    text.textContent=cfg.text;
    cfg.items.forEach(it=>{
      const disabled=(it.money<0 && p.money < -it.money);
      opts.append(optRow(optCls(it), it.label, effText(it), ()=>resolveEvent(p, effOf(it), '愛心結算'), disabled));
    });
  }
  else if(tile.type==='park'){
    text.textContent='來到公園散步休息，身心都放鬆了～';
    opts.append(optRow('good','🌳 享受公園時光','💪+1 💖+1',
      ()=>resolveEvent(p,{health:1,happy:1},'健康+1、幸福+1')));
  }
  else if(tile.type==='chance'){
    // 抽命運卡（從後台命運卡池隨機）
    const cards=G.config.tiles.chance.cards;
    const card=cards[Math.floor(Math.random()*cards.length)];
    text.innerHTML='🎲 命運卡：<br><b>'+escapeHtml(card.text)+'</b>';
    opts.append(optRow('special','✨ 接受命運', effText(card),
      ()=>resolveEvent(p, effOf(card), '命運卡結算完成')));
  }
  else if(tile.type==='start'){
    text.textContent='抵達夢想起點！請領取實體 200 元（系統不記錄金錢）。';
    opts.append(optRow('info','🏁 已領 200 元，繼續冒險','實體+200元',
      ()=>{ sfx.pass(); resolveEvent(p,{},'請發給 '+p.name+' 實體 200 元'); }));
  }
}
function closeModal(){ $('modalLayer').classList.add('hidden'); $('modalLayer').innerHTML=''; }

/* ==================================================
   結算 GET /api/game/results/{save}
=================================================== */
$('btnFinish').onclick=()=>{ sfx.click(); if(confirm('確定結束遊戲並進行結算嗎？')) endGame(); };
function totalScore(p){
  const fragBonus = p.fragments.every(f=>f.got)?SC_FRAG:0;
  return p.happy*SC_HAPPY + p.growth*SC_GROWTH + fragBonus + p.money;
}
function endGame(){
  closeModal();
  const ranked=G.players.map(p=>({...p, total:totalScore(p), fragDone:p.fragments.every(f=>f.got)}))
    .sort((a,b)=>b.total-a.total);
  const champ=ranked[0];
  let rows='';
  ranked.forEach((p,i)=>{
    const medal=['🥇','🥈','🥉'][i]||`${i+1}`;
    const fragBonus=p.fragDone?SC_FRAG:0;
    rows+=`<div class="res-row">
      <span class="r-rank">${medal}</span>
      <span class="r-emoji">${p.emoji}</span>
      <span class="r-name" style="color:${p.color}">${escapeHtml(p.name)}</span>
      <span class="r-break">💖${p.happy}×100 + 🌱${p.growth}×200 ${fragBonus?'+ 🧩500 ':''}+ 💰${p.money}</span>
      <span class="r-total">${p.total}</span>
    </div>`;
  });
  $('results').innerHTML=`<div class="res-card">
    <h2>🏆 冒險結算 🏆</h2>
    <div class="champ">
      <div class="c-emoji">${champ.emoji}</div>
      <div class="c-name" style="color:${champ.color}">總冠軍：${escapeHtml(champ.name)}</div>
      <div style="font-size:20px;color:var(--ink-soft);margin-top:4px;">總分 ${champ.total} 分</div>
    </div>
    ${rows}
    <button class="res-again" onclick="restart()">🔄 再玩一次</button>
  </div>`;
  $('results').classList.remove('hidden');
  sfx.win();
  bigConfetti();
}

/* ==================================================
   Confetti
=================================================== */
const cv=$('confetti'), cx=cv.getContext('2d');
let parts=[], ctimer=null;
function csize(){ cv.width=innerWidth; cv.height=innerHeight; }
addEventListener('resize',csize); csize();
function spawn(n){
  const cols=['#ff9eb5','#ffb38a','#8fd6a6','#8ec7f0','#c7a9f0','#ffd97a'];
  for(let i=0;i<n;i++) parts.push({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*0.3,
    vx:(Math.random()-.5)*3,vy:2+Math.random()*4,size:6+Math.random()*8,
    color:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*6,vr:(Math.random()-.5)*.3,life:0});
}
function runConfetti(){
  cv.classList.remove('hidden'); if(ctimer) return;
  ctimer=setInterval(()=>{
    cx.clearRect(0,0,cv.width,cv.height);
    parts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.rot+=p.vr; p.life++;
      cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot); cx.fillStyle=p.color; cx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.6); cx.restore(); });
    parts=parts.filter(p=>p.y<cv.height+30 && p.life<420);
    if(!parts.length){ clearInterval(ctimer); ctimer=null; cv.classList.add('hidden'); }
  },1000/45);
}
function bigConfetti(){ spawn(180); runConfetti(); }

/* ==================================================
   工具
=================================================== */
const DICE=['⚀','⚁','⚂','⚃','⚄','⚅'];
$('startGame').onclick=()=>{ Sound.ensure(); gameStart(); };
$('btnMute').onclick=()=>{
  const on=!Sound.isEnabled();
  Sound.setEnabled(on);
  if(on){ Sound.ensure(); Sound.click(); }
  $('btnMute').textContent = on ? '🔊 音效：開' : '🔇 音效：關';
};
function clamp(v){ return Math.max(0,Math.min(10,v)); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
let tt=null;
function toast(msg,warn){ const t=$('toast'); t.textContent=msg; t.className='toast show'+(warn?' warn':''); clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('show'),2400); }

/* 防止活動現場誤按重新整理／關閉分頁：遊戲進行中會跳出確認 */
window.addEventListener('beforeunload', e=>{
  saveSetup();
  if(G){ e.preventDefault(); e.returnValue=''; return ''; }
});
// 刻意重新開始（結算後「再玩一次」）：先清狀態再重載，不觸發攔截
function restart(){ G=null; location.reload(); }
